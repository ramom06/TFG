<section class="min-h-screen bg-[#06080f] flex items-center justify-center px-4 font-['Outfit',sans-serif] antialiased">

  <!-- Fondo decorativo -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div style="background: radial-gradient(ellipse 50% 60% at 50% 100%, rgba(224,28,46,0.12) 0%, transparent 70%)"
         class="absolute inset-0"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2
                font-['Bebas_Neue',sans-serif] text-[clamp(120px,22vw,300px)]
                text-white/[0.018] tracking-[0.02em] whitespace-nowrap pointer-events-none select-none leading-none">
      ADMIN
    </div>
  </div>

  <div class="relative w-full max-w-md">

    <!-- Logo / título -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-[#e01c2e]/10
                  border border-[#e01c2e]/20 mb-5">
        <svg class="text-[#e01c2e]" width="26" height="26" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1 class="font-['Bebas_Neue',sans-serif] text-4xl tracking-wider uppercase">
        Panel <span class="text-[#e01c2e]">Admin</span>
      </h1>
      <p class="mt-2 text-sm text-[#8b95a3]">Acceso restringido a administradores</p>
    </div>

    <!-- Card -->
    <div class="relative bg-[#0d1117] border border-white/[0.07] rounded-2xl overflow-hidden
                shadow-[0_32px_80px_rgba(0,0,0,0.6)]">
      <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-[#e01c2e] to-transparent"></div>

      <div class="p-8">

        <!-- Error -->
        @if (error()) {
          <div class="flex items-center gap-3 bg-[#1a0a0a] border border-[#e01c2e]/40 text-[#e01c2e]
                      text-sm px-4 py-3 rounded-xl mb-6">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ error() }}
          </div>
        }

        <!-- DNI -->
        <div class="mb-4">
          <label class="block text-[10px] font-bold uppercase tracking-[0.14em] text-[#4b5563] mb-1.5">
            DNI
          </label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-[#4b5563] pointer-events-none"
                 width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="5" width="20" height="14" rx="2"/>
              <line x1="2" y1="10" x2="22" y2="10"/>
            </svg>
            <input
              type="text" placeholder="12345678A"
              [value]="dni()" (input)="dni.set($any($event.target).value.toUpperCase())"
              (keydown.enter)="submit()"
              maxlength="9"
              class="w-full bg-[#141a24] border border-white/[0.07] rounded-lg pl-10 pr-4 py-2.5
                     text-[13.5px] text-[#eef0f4] placeholder-[#4b5563] outline-none transition-all
                     focus:border-[#e01c2e] focus:shadow-[0_0_0_3px_rgba(224,28,46,0.18)]
                     tracking-widest uppercase" />
          </div>
        </div>

        <!-- Contraseña -->
        <div class="mb-6">
          <label class="block text-[10px] font-bold uppercase tracking-[0.14em] text-[#4b5563] mb-1.5">
            Contraseña
          </label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-[#4b5563] pointer-events-none"
                 width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              [type]="showPass() ? 'text' : 'password'"
              placeholder="••••••••"
              [value]="password()" (input)="password.set($any($event.target).value)"
              (keydown.enter)="submit()"
              class="w-full bg-[#141a24] border border-white/[0.07] rounded-lg pl-10 pr-10 py-2.5
                     text-[13.5px] text-[#eef0f4] placeholder-[#4b5563] outline-none transition-all
                     focus:border-[#e01c2e] focus:shadow-[0_0_0_3px_rgba(224,28,46,0.18)]" />
            <button type="button" (click)="showPass.set(!showPass())"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-[#4b5563] hover:text-[#8b95a3] transition-colors">
              @if (showPass()) {
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <!-- Botón -->
        <button (click)="submit()" [disabled]="loading()"
                class="w-full flex items-center justify-center gap-2 bg-[#e01c2e] hover:bg-[#c4192a]
                       disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold
                       py-3 rounded-xl transition-all shadow-[0_4px_20px_rgba(224,28,46,0.35)]">
          @if (loading()) {
            <svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            Verificando...
          } @else {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Entrar al panel
          }
        </button>

        <!-- Volver -->
        <div class="mt-5 text-center">
          <a routerLink="/"
             class="text-xs text-[#4b5563] hover:text-[#8b95a3] transition-colors inline-flex items-center gap-1.5">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Volver al listado de campeonatos
          </a>
        </div>

      </div>
    </div>
  </div>
</section>
