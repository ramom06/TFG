<div class="flex flex-col gap-5">
  @for (mod of ['Kata', 'Kumite']; track mod) {
    @const lista = secciones()[mod];
    <div class="flex flex-col gap-2">
      <h3 class="text-[10px] font-bold uppercase text-[#4b5563] tracking-widest ml-1">{{ mod }}</h3>

      <div class="max-h-[160px] overflow-y-auto bg-[#0a0f1a] border border-white/5 rounded-xl p-2 custom-scroll">
        @if (lista.length === 0) {
          <p class="text-[11px] text-[#4b5563] p-3 italic text-center">No hay categorías disponibles.</p>
        }

        @for (cat of lista; track cat.id_categoria) {
          <label class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/5 cursor-pointer transition-colors"
                 [class.opacity-50]="yaInscritasIds.has(cat.id_categoria)">
            <input type="checkbox"
                   [checked]="estaSeleccionada(cat.id_categoria) || yaInscritasIds.has(cat.id_categoria)"
                   [disabled]="yaInscritasIds.has(cat.id_categoria)"
                   (change)="toggleCategoria(cat.id_categoria)"
                   class="w-4 h-4 accent-[#e01c2e]" />
            <div class="flex flex-col">
              <span class="text-[13px] text-[#eef0f4]">{{ cat.nombre }}</span>
              @if (yaInscritasIds.has(cat.id_categoria)) {
                <span class="text-[9px] font-bold text-green-500 uppercase">Ya inscrito</span>
              }
            </div>
          </label>
        }
      </div>
    </div>
  }
</div>
