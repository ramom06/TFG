services:

  mysql:
    image: mysql:8.0
    container_name: campeonato-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proyecto
      MYSQL_USER: campeonato
      MYSQL_PASSWORD: campeonato123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./ProyectoCampeonato
    container_name: campeonato-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/campeonato?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: campeonato
      SPRING_DATASOURCE_PASSWORD: campeonato123
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./ProyectoCampeonatoTFG
    container_name: campeonato-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: